[INPUT]
    # Use the 'tail' plugin to read logs from a file just like the Unix 'tail -f' command
    Name        tail
    
    # The path to the log file inside the Fluent Bit Docker container
    Path        /var/log/pipeline/app.log
    
    # Tag these logs so we can easily filter and route them
    Tag         raw_logs

[OUTPUT]
    # Route logs matching the 'raw_logs' tag to the Kafka message broker
    Name        kafka
    Match       raw_logs
    
    # The address of the Kafka broker on the Docker bridge network
    Brokers     kafka:9092
    
    # The Kafka topic to publish the logs to
    Topics      raw-events
