services:
  # 1. THE LOG PRODUCER (Application Simulator)
  # Continuously generates fake JSON logs and writes them to a shared volume.
  log-producer:
    build:
      context: .
      dockerfile: producers/Dockerfile
    container_name: log-producer
    volumes:
      - ./logs:/app/logs
    networks:
      - pipeline-net

  # 2. THE LOG COLLECTOR (Fluent Bit)
  # Tails the shared log file and forwards the raw logs to Kafka.
  fluent-bit:
    image: fluent/fluent-bit:latest
    container_name: fluent-bit
    volumes:
      - ./logs:/var/log/pipeline
      - ./config/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
    depends_on:
      - kafka
    networks:
      - pipeline-net

  # 3. THE MESSAGE BROKER (Apache Kafka)
  # Acts as the massive, scalable buffer. Decouples producers from downstream consumers.
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - pipeline-net

  # 4. THE STREAM PROCESSOR (Apache Flink / Python)
  # Reads live from Kafka, filters out DEBUG logs, enriches data, and pushes to Elasticsearch.
  stream-processor:
    platform: linux/amd64 # Forces x86_64 architecture to bypass Apple Silicon compilation issues
    build:
      context: ./jobs
      dockerfile: Dockerfile
    container_name: stream-processor
    depends_on:
      - kafka
      - elasticsearch
    networks:
      - pipeline-net

  # 5. THE STORAGE DATABASE (Elasticsearch)
  # High-performance NoSQL database built for searching and indexing massive log volumes.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Disable passwords for local testing
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Keep memory usage low locally
    ports:
      - "9200:9200"
    networks:
      - pipeline-net

  # 6. THE VISUALIZATION UI (Kibana)
  # Connects to Elasticsearch to provide interactive dashboards and log discovery.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - pipeline-net

# A shared custom Docker bridge network so all containers can resolve each other by container_name
networks:
  pipeline-net:
    driver: bridge
